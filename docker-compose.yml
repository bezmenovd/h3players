services:
  web:
    image: node:22
    container_name: h3players-web
    restart: unless-stopped
    ports:
      - 5173:5173
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - yarn-cache:/root/.yarn/cache
    command: bash -c "yarn && yarn run web:dev"

  api:
    image: node:22
    container_name: h3players-api
    restart: unless-stopped
    depends_on:
      - mysql
      - redis
      - clickhouse
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - yarn-cache:/root/.yarn/cache
    command: bash -c "yarn && yarn run api:start:dev"

  workers:
    image: node:22
    container_name: h3players-workers
    restart: unless-stopped
    depends_on:
      - mysql
      - redis
      - clickhouse
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - yarn-cache:/root/.yarn/cache
    command: bash -c "sleep 100000"

  nginx:
    image: nginx:alpine
    container_name: h3players-nginx
    restart: unless-stopped
    ports:
      - 80:80
      - 443:443
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/fullchain.pem:/etc/nginx/ssl/fullchain.pem:ro
      - ./docker/nginx/privkey.pem:/etc/nginx/ssl/privkey.pem:ro
      - ./:/var/www:ro
    depends_on:
      - web

  mysql:
    image: mysql/mysql-server:8.0
    container_name: h3players-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: database
      MYSQL_USER: user
      MYSQL_PASSWORD: jk7S91xAC5bE5l3I
      MYSQL_ALLOW_EMPTY_PASSWORD: 1
    volumes:
      - mysql-volume:/var/lib/mysql

  redis:
    image: redis:alpine
    container_name: h3players-redis
    restart: unless-stopped
    volumes:
      - redis-volume:/data

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: h3players-clickhouse
    restart: unless-stopped
    environment:
      - CLICKHOUSE_PASSWORD=xQm8LpsLOolVLryE
    volumes:
      - clickhouse-volume:/var/lib/clickhouse
      - ./docker/clickhouse/initdb:/docker-entrypoint-initdb.d:ro
      - ./docker/clickhouse/:/usr/src
      - ./docker/clickhouse/listen.xml:/etc/clickhouse-server/config.d/listen.xml:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

volumes:
  mysql-volume:
    driver: local
  redis-volume:
    driver: local
  clickhouse-volume:
    driver: local
  yarn-cache:
    driver: local
