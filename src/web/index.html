<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <link rel="icon" type="image/png" href="/img/logo-32.png" />
    <title>h3players</title>
    <script type="module" src="/src/app.ts"></script>
</head>
<body>
    <div id="invalid-resolution">
        Screen resolution is not supported
    </div>
    <div id="root"></div>
</body>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        color: #dedede;
        user-select: none;
    }
    .selectable, .selectable * {
        user-select: text !important;
    }
    .markdown, .markdown * {
        user-select: text !important;
    }
    body {
        background-color: #272c3a; 
        height: 100vh;
    }
    #invalid-resolution {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 30px;
        position: fixed;
        top: 0;
        left: 0;
        display: none;
        font-size: 26px;
        font-weight: 500;
        opacity: .7;
        user-select: unset !important;
    }

    @media (max-width: 1279px) {
        #invalid-resolution {
            display: flex;
        }
        #root {
            display: none;
        }
    }
    @media (min-width: 2561px) {
        #invalid-resolution {
            display: flex;
        }
        #root {
            display: none;
        }
    }
</style>
</html>
